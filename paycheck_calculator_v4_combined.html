/* ═══════════════════════════════════════
   FEDERAL TAX  (2025)
═══════════════════════════════════════ */
function applyBrackets(income, tiers) {
  let tax=0,prev=0;
  for(const [cap,rate] of tiers){
    if(income<=prev)break;
    tax+=(Math.min(income,cap)-prev)*rate;
    prev=cap;
    if(!isFinite(cap))break;
  }
  return tax;
}
const FED={
  single:{std:15000,t:[[11925,.10],[48475,.12],[103350,.22],[197300,.24],[250525,.32],[626350,.35],[Infinity,.37]]},
  mfj:{std:30000,t:[[23850,.10],[96950,.12],[206700,.22],[394600,.24],[501050,.32],[751600,.35],[Infinity,.37]]},
  mfs:{std:15000,t:[[11925,.10],[48475,.12],[103350,.22],[197300,.24],[250525,.32],[626350,.35],[Infinity,.37]]},
  hoh:{std:22500,t:[[17000,.10],[64850,.12],[103350,.22],[197300,.24],[250500,.32],[626350,.35],[Infinity,.37]]},
};
function calcFed(pw,fs,periods){
  const cfg=FED[fs];
  return applyBrackets(Math.max(0,pw*periods-cfg.std),cfg.t)/periods;
}

/* Compute effective state tax rate (%) from annual gross income */
function calcStateEffRate(annualGross, code, fs) {
  if(!annualGross||annualGross<=0||!code) return null;
  const d=STD[code];
  if(d===null||d===undefined) return 0;               // no income tax
  if(d.flat!==undefined) return d.flat;               // flat rate — same regardless of income
  if(!d.brackets) return null;
  const tiers=d.brackets[fs]||d.brackets['single'];
  if(!tiers) return null;
  const tax=applyBrackets(annualGross,tiers);
  return Math.round((tax/annualGross)*10000)/100;      // effective %, 2 decimal places
}

function stateTag(code, annualGross, hasIncome) {
  if(!code) return null;
  const d=STD[code];
  if(d===null||d===undefined) return {label:'no state tax', color:'var(--green)'};
  if(d.flat!==undefined) return {label:'flat rate', color:'var(--text3)'};
  return hasIncome
    ? {label:'effective rate', color:'var(--blue)'}
    : {label:'suggested',      color:'var(--text3)'};
}

const n=v=>parseFloat(v)||0;

/* ═══════════════════════════════════════
   PAY DAY CALENDAR
═══════════════════════════════════════ */
const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAY_ABBR=['Su','Mo','Tu','We','Th','Fr','Sa'];
function PayDayCalendar({payDays,setPayDays}){
  const now=new Date();
  const [month,setMonth]=useState(now.getMonth());
  const [year,setYear]=useState(now.getFullYear());
  const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDow=new Date(year,month,1).getDay();
  function prevMonth(){if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}
  function nextMonth(){if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}
  function toggleDay(day){
    if(payDays.includes(day))setPayDays(payDays.filter(d=>d!==day));
    else if(payDays.length<2)setPayDays([...payDays,day].sort((a,b)=>a-b));
  }
  const cells=[...Array(firstDow).fill(null),...Array.from({length:daysInMonth},(_,i)=>i+1)];
  while(cells.length%7!==0)cells.push(null);
  let st,sc;
  if(payDays.length===2){st=`Pay days: ${ordinal(payDays[0])} and ${ordinal(payDays[1])} of each month`;sc='var(--green)';}
  else if(payDays.length===1){st=`${ordinal(payDays[0])} selected — pick one more pay day`;sc='var(--accent)';}
  else{st='Click two days below to set your monthly pay days';sc='var(--text2)';}
  return(
    <div className="card">
      <div className="sec-head">Pay Days — Twice Monthly</div>
      <div style={{padding:'14px 16px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <button className="cal-nav-btn" onClick={prevMonth}>‹</button>
          <span style={{color:'var(--text)',fontSize:15,fontWeight:600}}>{MONTH_NAMES[month]} {year}</span>
          <button className="cal-nav-btn" onClick={nextMonth}>›</button>
        </div>
        <p style={{fontSize:12,color:sc,textAlign:'center',marginBottom:12,minHeight:18}}>{st}</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7, 1fr)',gap:4,marginBottom:4}}>
          {DAY_ABBR.map(d=><div key={d} style={{textAlign:'center',fontSize:11,color:'var(--text3)',fontWeight:600,padding:'2px 0'}}>{d}</div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7, 1fr)',gap:4}}>
          {cells.map((day,i)=>{
            const sel=day&&payDays.includes(day);
            const dim=day&&!sel&&payDays.length===2;
            return<div key={i} className={!day?'cal-day empty':sel?'cal-day selected':dim?'cal-day dimmed':'cal-day available'} onClick={()=>day&&toggleDay(day)}>{day||''}</div>;
          })}
        </div>
        {payDays.length>0&&<div style={{textAlign:'center',marginTop:12}}><button onClick={()=>setPayDays([])} style={{background:'none',border:'none',color:'var(--text3)',fontSize:11,cursor:'pointer',textDecoration:'underline'}}>Clear selection</button></div>}
      </div>
    </div>
  );
}

    <div style={{minWidth:168,flex:'0 0 168px'}}>
      <div style={{color:'var(--text)',fontSize:13,fontWeight:500}}>{label}</div>
      {subtitle&&<div style={{fontSize:10,color:subtitleColor||'var(--text3)',marginTop:2,lineHeight:1.4}}>{subtitle}</div>}
    </div>
    <LockBtn locked={field.locked} onToggle={()=>setField(f=>({...f,locked:!f.locked}))}/>
    <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
      <input type="number" min="0" step="0.01" value={field.value} readOnly={field.locked} placeholder="0" style={{width:isPercent?64:84}} onChange={e=>!field.locked&&setField(f=>({...f,value:e.target.value}))}/>
      {isPercent&&<span style={{fontSize:12,color:'var(--text2)'}}>%</span>}
    </div>
    <span className={`pill pill-static ${isPreTax?'pill-pre':'pill-post'}`}>{isPreTax?'● Pre-Tax':'○ After-Tax'}</span>
    <span className="amount" style={{color:amount>0?'var(--red)':'var(--text3)'}}>{fmt(amount)}</span>
  </div>
);}

function TaxRow({label,amount}){return(
  <div className="row">
    <div style={{minWidth:168,flex:'0 0 168px',color:'var(--text)',fontSize:13,fontWeight:500}}>{label}</div>
    <span style={{fontSize:11,color:'var(--text3)',fontStyle:'italic',flex:1}}>estimated</span>
    <span className="amount" style={{color:amount>0?'var(--red)':'var(--text3)'}}>{fmt(amount)}</span>
  </div>
);}

function SumLine({label,value,dim}){return(
  <div className="sum-line">
    <span style={{fontSize:dim?12:13,color:dim?'var(--text3)':'var(--text2)'}}>{label}</span>
    <span style={{fontFamily:'var(--mono)',fontSize:dim?12:13,color:dim?'var(--text3)':value<0?'var(--red)':'var(--text)'}}>{fmt(value)}</span>
  </div>
);}

/* ═══════════════════════════════════════
   MAIN APP
═══════════════════════════════════════ */
function App(){
  const [fs,setFs]=useState(SAVED.fs||'single');
  const [payType,setPayType]=useState(SAVED.payType||'hourly');
  const [payFreq,setPayFreq]=useState(SAVED.payFreq||'biweekly');
  const [payDays,setPayDays]=useState(SAVED.payDays||[]);
  const [selectedState,setSelectedState]=useState(SAVED.selectedState||'');
  const [base,setBase]=useState(SAVED.base||mkF());
  const [hrs,setHrs]=useState(SAVED.hrs||mkF());
  const [ot,setOt]=useState(SAVED.ot||mkF());
  const [workedHol,setWorkedHol]=useState(SAVED.workedHol||mkF());
  const [pto,setPto]=useState(SAVED.pto||mkF());
  const [sick,setSick]=useState(SAVED.sick||mkF());
  const [hol,setHol]=useState(SAVED.hol||mkF());
  const [salary,setSalary]=useState(SAVED.salary||mkF());
  const [preBens,setPreBens]=useState(SAVED.preBens||mkF());
  const [postBens,setPostBens]=useState(SAVED.postBens||mkF());
  const [kPre,setKPre]=useState(SAVED.kPre||mkF());
  const [kRoth,setKRoth]=useState(SAVED.kRoth||mkF());
  const [k401AT,setK401AT]=useState(SAVED.k401AT||mkF());
  const [espp,setEspp]=useState(SAVED.espp||mkF());
  const [kLoan,setKLoan]=useState(SAVED.kLoan||mkF(true,'148.48'));
  const [postRetire,setPostRetire]=useState(SAVED.postRetire||mkF());
  const [staticD,setStaticD]=useState(SAVED.staticD||mkSD(false,'','',false));
  const [statePct,setStatePct]=useState(SAVED.statePct||mkF(false,'9'));
  const [flash,setFlash]=useState(false);
  const flashTimer=useRef(null);

  /* Annualized gross — used for bracket-based state tax suggestion */
  const annualGross=useMemo(()=>{
    const isH=payType==='hourly';
    const periods=PERIODS[payFreq];
    if(!isH) return n(salary.value);
    const bp=n(base.value);
    const pg=bp*n(hrs.value)+bp*1.5*n(ot.value)+bp*1.5*n(workedHol.value)+bp*n(pto.value)+bp*n(sick.value)+bp*n(hol.value);
    return pg*periods;
  },[payType,payFreq,salary,base,hrs,ot,workedHol,pto,sick,hol]);

  /* Auto-update state tax % when income, state, or filing status changes (if not locked) */
  useEffect(()=>{
    if(!selectedState||statePct.locked||annualGross<=0) return;
    const eff=calcStateEffRate(annualGross,selectedState,fs);
    if(eff!==null) setStatePct(f=>({...f,value:String(eff)}));
  },[annualGross,selectedState,fs,statePct.locked]);

  function handleStateSelect(e){
    const code=e.target.value;
    setSelectedState(code);
    if(!code) return;
    const eff=annualGross>0?calcStateEffRate(annualGross,code,fs):null;
    if(eff!==null){setStatePct(f=>({...f,value:String(eff)}));return;}
    // fallback: use a static default when no income entered yet
    const FALLBACK={AL:5,AR:4.4,CA:6,CT:5,DE:5.2,HI:7.5,KS:5.2,LA:3,ME:6,MD:4.75,MN:6.8,MO:4.7,MT:5.9,NE:5.2,NJ:5.5,NM:4.9,NY:6,ND:2.5,OH:3.75,OK:4.75,OR:9,RI:4.75,SC:6.2,VT:6.6,VA:5.75,WI:5.3,DC:6};
    const fb=FALLBACK[code];
    if(fb!==undefined) setStatePct(f=>({...f,value:String(fb)}));
  }

  useEffect(()=>{
    persist({fs,payType,payFreq,payDays,selectedState,base,hrs,ot,workedHol,pto,sick,hol,salary,preBens,postBens,kPre,kRoth,k401AT,espp,kLoan,postRetire,staticD,statePct});
    setFlash(true);clearTimeout(flashTimer.current);
    flashTimer.current=setTimeout(()=>setFlash(false),1400);
  },[fs,payType,payFreq,payDays,selectedState,base,hrs,ot,workedHol,pto,sick,hol,salary,preBens,postBens,kPre,kRoth,k401AT,espp,kLoan,postRetire,staticD,statePct]);

  const c=useMemo(()=>{
    const isH=payType==='hourly';const periods=PERIODS[payFreq];
    const bp=n(base.value);
    const regPay=bp*n(hrs.value),otPay=bp*1.5*n(ot.value),wHolPay=bp*1.5*n(workedHol.value);
    const ptoPay=bp*n(pto.value),sickPay=bp*n(sick.value),holPay=bp*n(hol.value);
    const grossPay=isH?regPay+otPay+wHolPay+ptoPay+sickPay+holPay:n(salary.value)/periods;
    const esppAmt=(isH?regPay+ptoPay+sickPay:0)*n(espp.value)/100;
    const kPreAmt=grossPay*n(kPre.value)/100,kRothAmt=grossPay*n(kRoth.value)/100;
    const k401ATAmt=grossPay*n(k401AT.value)/100;
    const preBensAmt=n(preBens.value),postBensAmt=n(postBens.value);
    const postRetireAmt=isH?0:n(postRetire.value);
    const staticAmt=isH?n(kLoan.value):n(staticD.value);
    const staticPre=isH?false:staticD.preTax;
    const totPre=preBensAmt+kPreAmt+(staticPre?staticAmt:0);
    const fedWages=Math.max(0,grossPay-totPre);
    const fedTax=calcFed(fedWages,fs,periods);
    const oreTax=fedWages*n(statePct.value)/100;
    const ssTax=grossPay*0.062,medTax=grossPay*0.0145;
    const totPost=postBensAmt+postRetireAmt+esppAmt+kRothAmt+k401ATAmt+(staticPre?0:staticAmt);
    const netPay=grossPay-totPre-fedTax-oreTax-ssTax-medTax-totPost;
    return{regPay,otPay,wHolPay,ptoPay,sickPay,holPay,grossPay,esppAmt,kPreAmt,kRothAmt,k401ATAmt,preBensAmt,postBensAmt,postRetireAmt,staticAmt,totPre,fedWages,fedTax,oreTax,ssTax,medTax,totPost,netPay};
  },[payType,payFreq,base,hrs,ot,workedHol,pto,sick,hol,salary,preBens,postBens,kPre,kRoth,k401AT,espp,kLoan,postRetire,staticD,statePct,fs]);

  const isH=payType==='hourly';
  const tagInfo=stateTag(selectedState,annualGross,annualGross>0);
  const stateLabel=selectedState?(STATE_LIST.find(x=>x.code===selectedState)||{}).name||'':null;

  return(
    <>
      {/* HEADER */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:16,paddingBottom:12,borderBottom:'1px solid var(--brd)'}}>
        <div>
          <p style={{fontSize:10,fontWeight:600,letterSpacing:'.18em',textTransform:'uppercase',color:'var(--accent)',marginBottom:2}}>
            {FREQ_LABEL[payFreq]} · {isH?'Hourly':'Salaried'}
          </p>
          <h1 style={{fontSize:20,fontWeight:700,color:'var(--text)',letterSpacing:'-.01em'}}>Paycheck Calculator</h1>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
          <span className={`saved-badge ${flash?'show':''}`}>✓ Saved</span>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:12,color:'var(--text2)'}}>Filing Status</span>
            <select value={fs} onChange={e=>setFs(e.target.value)}>
              <option value="single">Single</option><option value="mfj">Married Filing Jointly</option>
              <option value="mfs">Married Filing Separately</option><option value="hoh">Head of Household</option>
            </select>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:12,color:'var(--text2)'}}>How Are You Paid</span>
            <select value={payType} onChange={e=>setPayType(e.target.value)}>
              <option value="hourly">Hourly</option><option value="salary">Salary</option>
            </select>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:12,color:'var(--text2)'}}>How Often Are You Paid</span>
            <select value={payFreq} onChange={e=>setPayFreq(e.target.value)}>
              <option value="weekly">Weekly</option><option value="biweekly">Bi-Weekly</option>
              <option value="twicemonthly">Twice Monthly</option><option value="monthly">Monthly</option>
            </select>
          </div>
        </div>
      </div>

      {payFreq==='twicemonthly'&&<PayDayCalendar payDays={payDays} setPayDays={setPayDays}/>}

      {/* BASE PAY */}
      {isH&&(
        <div className="card"><div className="sec-head">Base Pay</div>
          <div className="row">
            <div style={{minWidth:168,flex:'0 0 168px',color:'var(--text)',fontSize:13,fontWeight:500}}>Hourly Rate</div>
            <LockBtn locked={base.locked} onToggle={()=>setBase(f=>({...f,locked:!f.locked}))}/>
            <div style={{display:'flex',alignItems:'center',gap:4}}>
              <span style={{fontSize:13,color:'var(--text2)'}}>$</span>
              <input type="number" min="0" step="0.01" value={base.value} readOnly={base.locked} placeholder="0.00" style={{width:96}} onChange={e=>!base.locked&&setBase(f=>({...f,value:e.target.value}))}/>
              <span style={{fontSize:12,color:'var(--text3)'}}>/hr</span>
            </div>
          </div>
        </div>
      )}
      {!isH&&(
        <div className="card"><div className="sec-head">Base Pay</div>
          <div className="row">
            <div style={{minWidth:168,flex:'0 0 168px',color:'var(--text)',fontSize:13,fontWeight:500}}>Annual Salary</div>
            <LockBtn locked={salary.locked} onToggle={()=>setSalary(f=>({...f,locked:!f.locked}))}/>
            <div style={{display:'flex',alignItems:'center',gap:4}}>
              <span style={{fontSize:13,color:'var(--text2)'}}>$</span>
              <input type="number" min="0" step="1" value={salary.value} readOnly={salary.locked} placeholder="0" style={{width:112}} onChange={e=>!salary.locked&&setSalary(f=>({...f,value:e.target.value}))}/>
              <span style={{fontSize:12,color:'var(--text3)'}}>/yr</span>
            </div>
            <span style={{fontSize:11,color:'var(--text2)',marginLeft:'auto'}}>
              {FREQ_LABEL[payFreq]} gross:&nbsp;
              <span style={{fontFamily:'var(--mono)',color:c.grossPay>0?'var(--accent)':'var(--text3)',fontWeight:600}}>{fmt(c.grossPay)}</span>
            </span>
          </div>
        </div>
      )}

      {/* EARNINGS */}
      {isH&&(
        <div className="card"><div className="sec-head">Earnings</div>
          <EarnRow label="Regular Hours"        field={hrs}       setField={setHrs}       pay={c.regPay}/>
          <EarnRow label="Overtime Hours"       field={ot}        setField={setOt}        pay={c.otPay}        note="×1.5"/>
          <EarnRow label="Worked Holiday Hours" field={workedHol} setField={setWorkedHol} pay={c.wHolPay}      note="×1.5"/>
          <EarnRow label="PTO Hours"            field={pto}       setField={setPto}       pay={c.ptoPay}/>
          <EarnRow label="Sick Hours"           field={sick}      setField={setSick}      pay={c.sickPay}/>
          <EarnRow label="Holiday Hours"        field={hol}       setField={setHol}       pay={c.holPay}/>
          <div className="gross-row">
            <span style={{fontSize:11,fontWeight:600,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--text2)'}}>Gross Pay</span>
            <span style={{fontFamily:'var(--mono)',fontSize:17,fontWeight:700,color:c.grossPay>0?'var(--accent)':'var(--text3)'}}>{fmt(c.grossPay)}</span>
          </div>
        </div>
      )}

      {/* DEDUCTIONS */}
      <div className="card"><div className="sec-head">Deductions</div>
        <div className="col-heads">
          <span style={{minWidth:168,flex:'0 0 168px'}}/><span style={{minWidth:32}}/>
          <span className="col-head" style={{minWidth:92}}>Amount</span>
          <span className="col-head" style={{minWidth:88}}>Tax Status</span>
          <span className="col-head" style={{marginLeft:'auto'}}>Deducted</span>
        </div>
        <DeductRow label="Pre-Tax Benefits" subtitle="Medical · Dental · Vision · Flex Health"
          field={preBens} setField={setPreBens} amount={c.preBensAmt} isPreTax={true}/>
        <DeductRow label="After-Tax Benefits" subtitle="Life · AD&D · Critical · Accidental · Hospital · Legal"
          field={postBens} setField={setPostBens} amount={c.postBensAmt} isPreTax={false}/>
        {!isH&&<DeductRow label="After-Tax Non-Roth" field={postRetire} setField={setPostRetire} amount={c.postRetireAmt} isPreTax={false}/>}
        <div className="divider"/>
        <DeductRow label="401k Pre-Tax %" field={kPre} setField={setKPre} amount={c.kPreAmt} isPercent={true} isPreTax={true}/>
        <DeductRow label="401k Roth %"    field={kRoth} setField={setKRoth} amount={c.kRothAmt} isPercent={true} isPreTax={false}/>
        <DeductRow label="401k After-Tax %" subtitle="Mega backdoor · after-tax non-Roth" subtitleColor="var(--red)"
          field={k401AT} setField={setK401AT} amount={c.k401ATAmt} isPercent={true} isPreTax={false}/>
        {isH&&<DeductRow label="ESPP Purchase" subtitle="% of reg + PTO + sick pay · after-tax"
          field={espp} setField={setEspp} amount={c.esppAmt} isPercent={true} isPreTax={false}/>}
      </div>

      {/* TAXES */}
      <div className="card"><div className="sec-head">Taxes — Estimated</div>
        <TaxRow label="Federal Income Tax"     amount={c.fedTax}/>
        <TaxRow label="Social Security (6.2%)" amount={c.ssTax}/>
        <TaxRow label="Medicare (1.45%)"       amount={c.medTax}/>
        {/* State tax row */}
        <div className="row">
          <span style={{fontSize:13,fontWeight:500,color:'var(--text)',flexShrink:0,marginRight:4}}>State Tax</span>
          <select value={selectedState} onChange={handleStateSelect} style={{flex:1,minWidth:110,maxWidth:210,fontSize:12}}>
            <option value="">— select state —</option>
            {STATE_LIST.map(s=><option key={s.code} value={s.code}>{s.name}</option>)}
          </select>
          <LockBtn locked={statePct.locked} onToggle={()=>setStatePct(f=>({...f,locked:!f.locked}))}/>
          <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
            <input type="number" min="0" step="0.01" value={statePct.value} readOnly={statePct.locked} placeholder="0" style={{width:58}} onChange={e=>!statePct.locked&&setStatePct(f=>({...f,value:e.target.value}))}/>
            <span style={{fontSize:12,color:'var(--text2)'}}>%</span>
          </div>
          {tagInfo&&<span style={{fontSize:10,color:tagInfo.color,fontStyle:'italic',flexShrink:0,minWidth:76}}>{tagInfo.label}</span>}
          <span className="amount" style={{color:c.oreTax>0?'var(--red)':'var(--text3)'}}>{fmt(c.oreTax)}</span>
        </div>
      </div>

      {/* STATIC DEDUCTIONS */}
      <div className="card">
        <div className="sec-head">{isH?'Static After-Tax Deductions':'Static Deductions'}</div>
        {isH?(
          <div className="row">
            <div style={{minWidth:168,flex:'0 0 168px',color:'var(--text)',fontSize:13,fontWeight:500}}>401k Loan(s)</div>
            <LockBtn locked={kLoan.locked} onToggle={()=>setKLoan(f=>({...f,locked:!f.locked}))}/>
            <div style={{display:'flex',alignItems:'center',gap:4}}>
              <span style={{fontSize:13,color:'var(--text2)'}}>$</span>
              <input type="number" min="0" step="0.01" value={kLoan.value} readOnly={kLoan.locked} placeholder="0.00" style={{width:84}} onChange={e=>!kLoan.locked&&setKLoan(f=>({...f,value:e.target.value}))}/>
            </div>
            <span style={{fontSize:11,color:'var(--text3)',fontStyle:'italic',flex:1}}>fixed · after-tax</span>
            <span className="amount" style={{color:c.staticAmt>0?'var(--red)':'var(--text3)'}}>{fmt(c.staticAmt)}</span>
          </div>
        ):(
          <div className="row">
            <input type="text" maxLength={48} value={staticD.description} readOnly={staticD.locked} placeholder="Description"
              style={{minWidth:0,flex:'1 1 160px',maxWidth:200}} onChange={e=>!staticD.locked&&setStaticD(f=>({...f,description:e.target.value}))}/>
            <LockBtn locked={staticD.locked} onToggle={()=>setStaticD(f=>({...f,locked:!f.locked}))}/>
            <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
              <span style={{fontSize:13,color:'var(--text2)'}}>$</span>
              <input type="number" min="0" step="0.01" value={staticD.value} readOnly={staticD.locked} placeholder="0.00" style={{width:84}} onChange={e=>!staticD.locked&&setStaticD(f=>({...f,value:e.target.value}))}/>
            </div>
            <button className={`pill pill-toggle ${staticD.preTax?'pill-pre':'pill-post'}`}
              onClick={()=>!staticD.locked&&setStaticD(f=>({...f,preTax:!f.preTax}))} title="Toggle pre-tax / after-tax">
              {staticD.preTax?'● Pre-Tax':'○ After-Tax'}
            </button>
            <span className="amount" style={{color:c.staticAmt>0?'var(--red)':'var(--text3)'}}>{fmt(c.staticAmt)}</span>
          </div>
        )}
      </div>

      {/* SUMMARY */}
      <div className="card" style={{border:'1px solid var(--brd-em)'}}>
        <div className="sec-head">Summary</div>
        <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:7}}>
          <SumLine label="Gross Pay"                         value={c.grossPay}/>
          <SumLine label="Pre-Tax Deductions"                value={-c.totPre}/>
          <SumLine label="→ Federal Taxable Wages"           value={c.fedWages} dim/>
          <SumLine label="Federal Income Tax"                value={-c.fedTax}/>
          <SumLine label="Social Security (6.2%)"            value={-c.ssTax}/>
          <SumLine label="Medicare (1.45%)"                  value={-c.medTax}/>
          <SumLine label={`State Tax${stateLabel?' ('+stateLabel+')':''}`} value={-c.oreTax}/>
          <SumLine label="After-Tax Deductions"              value={-c.totPost}/>
          <div style={{borderTop:'1px solid var(--brd-em)',marginTop:4,paddingTop:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--accent)'}}>Estimated Net Pay</span>
            <span style={{fontFamily:'var(--mono)',fontSize:24,fontWeight:700,color:'var(--accent)'}}>{fmt(c.netPay)}</span>
          </div>
        </div>
      </div>

      {/* DISCLAIMER */}
      <p style={{fontSize:11,color:'var(--text3)',textAlign:'center',marginTop:10,lineHeight:1.8}}>
        Federal: 2025 IRS Pub. 15-T · State brackets: 2024/2025 — effective rate shown (tax ÷ gross income)<br/>
        State std. deductions &amp; local/county taxes (MD, NYC, etc.) not applied · SS wage base $176,100 · Estimates only
      </p>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
