<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paycheck Calculator</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg:#0d1117;--card:#161b22;--card-dk:#0f172a;
      --brd:rgba(255,255,255,0.08);--brd-em:rgba(255,255,255,0.15);
      --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
      --accent:#d97706;--acc-bg:rgba(217,119,6,0.12);--acc-brd:rgba(217,119,6,0.45);
      --green:#3fb950;--grn-bg:rgba(63,185,80,0.12);--grn-brd:rgba(63,185,80,0.40);
      --blue:#58a6ff;--red:#f85149;
      --mono:'Cascadia Code','JetBrains Mono','Fira Code','Courier New',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}
    #root{max-width:720px;margin:0 auto;padding:24px 16px 52px;}
    input[type="number"]{background:#010409;border:1px solid var(--brd);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:13px;padding:4px 8px;text-align:right;outline:none;transition:border-color .15s,box-shadow .15s;-moz-appearance:textfield;}
    input[type="number"]:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--acc-bg);}
    input[type="number"][readonly]{opacity:.45;cursor:not-allowed;}
    input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;}
    select{background:#1c2128;border:1px solid var(--brd-em);border-radius:4px;color:var(--text);font-family:inherit;font-size:13px;padding:5px 8px;cursor:pointer;outline:none;}
    select:focus{border-color:var(--accent);}
    button{font-family:inherit;cursor:pointer;outline:none;}
    .card{background:var(--card);border:1px solid var(--brd);border-radius:10px;overflow:hidden;margin-bottom:10px;}
    .sec-head{background:var(--card-dk);border-bottom:1px solid var(--brd);color:var(--text2);font-size:10px;font-weight:600;letter-spacing:.15em;padding:5px 16px;text-transform:uppercase;}
    .row{display:flex;align-items:center;gap:8px;padding:7px 16px;border-bottom:1px solid var(--brd);min-height:44px;}
    .row:last-child{border-bottom:none;}
    .amount{font-family:var(--mono);font-size:13px;font-weight:600;margin-left:auto;min-width:96px;text-align:right;}
    .lock-btn{display:flex;align-items:center;justify-content:center;padding:4px 7px;border-radius:4px;flex-shrink:0;transition:all .15s;line-height:1;}
    .lock-btn.on{background:var(--acc-bg);border:1px solid var(--acc-brd);color:var(--accent);}
    .lock-btn.off{background:transparent;border:1px solid var(--brd);color:var(--text3);}
    .lock-btn:hover{opacity:.75;}
    .pill{border-radius:99px;font-size:10px;font-weight:600;letter-spacing:.06em;padding:3px 10px;text-transform:uppercase;white-space:nowrap;min-width:84px;text-align:center;flex-shrink:0;border:1px solid;}
    .pill-static{opacity:.65;cursor:default;}
    .pill-pre{background:var(--grn-bg);border-color:var(--grn-brd);color:var(--green);}
    .pill-post{background:rgba(255,255,255,.04);border-color:var(--brd-em);color:var(--text2);}
    .col-heads{display:flex;align-items:center;gap:8px;padding:3px 16px;min-height:28px;background:var(--card-dk);border-bottom:1px solid var(--brd);}
    .col-head{font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
    .gross-row{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--card-dk);}
    .sum-line{display:flex;justify-content:space-between;align-items:center;padding:3px 0;}
    .saved-badge{font-size:11px;color:var(--green);opacity:0;transition:opacity .3s;pointer-events:none;}
    .saved-badge.show{opacity:1;}
    .divider{border-top:1px solid var(--brd-em);margin:0 16px;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

/* ── Federal Tax (2025) ── */
function applyBrackets(income,tiers){let tax=0,prev=0;for(const [cap,rate] of tiers){if(income<=prev)break;tax+=(Math.min(income,cap)-prev)*rate;prev=cap;if(!isFinite(cap))break;}return tax;}
const FED={
  single:{std:15000,t:[[11925,.10],[48475,.12],[103350,.22],[197300,.24],[250525,.32],[626350,.35],[Infinity,.37]]},
  mfj:{std:30000,t:[[23850,.10],[96950,.12],[206700,.22],[394600,.24],[501050,.32],[751600,.35],[Infinity,.37]]},
  mfs:{std:15000,t:[[11925,.10],[48475,.12],[103350,.22],[197300,.24],[250525,.32],[626350,.35],[Infinity,.37]]},
  hoh:{std:22500,t:[[17000,.10],[64850,.12],[103350,.22],[197300,.24],[250500,.32],[626350,.35],[Infinity,.37]]},
};
function calcFed(bw,fs){const cfg=FED[fs];return applyBrackets(Math.max(0,bw*26-cfg.std),cfg.t)/26;}

/* ── State Tax Data (all 50 states + DC — 2024/2025) ── */
const STD={
  AK:null,FL:null,NV:null,NH:null,SD:null,TN:null,TX:null,WA:null,WY:null,
  AZ:{flat:2.50},CO:{flat:4.40},GA:{flat:5.49},ID:{flat:5.80},IL:{flat:4.95},IN:{flat:3.05},IA:{flat:3.80},KY:{flat:4.00},MA:{flat:5.00},MI:{flat:4.25},MS:{flat:4.70},NC:{flat:4.50},PA:{flat:3.07},UT:{flat:4.55},WV:{flat:4.82},
  AL:{brackets:{single:[[500,.02],[3000,.04],[Infinity,.05]],mfj:[[1000,.02],[6000,.04],[Infinity,.05]]}},
  AR:{brackets:{single:[[4300,.02],[8500,.034],[Infinity,.044]],mfj:[[4300,.02],[8500,.034],[Infinity,.044]]}},
  CA:{brackets:{single:[[10756,.01],[25499,.02],[40245,.04],[55866,.06],[70606,.08],[360659,.093],[432787,.103],[721314,.113],[1000000,.123],[Infinity,.133]],mfj:[[21512,.01],[50998,.02],[80490,.04],[111732,.06],[141212,.08],[721318,.093],[865574,.103],[1442628,.113],[2000000,.123],[Infinity,.133]],mfs:[[10756,.01],[25499,.02],[40245,.04],[55866,.06],[70606,.08],[360659,.093],[432787,.103],[721314,.113],[1000000,.123],[Infinity,.133]]}},
  CT:{brackets:{single:[[10000,.03],[50000,.05],[100000,.055],[200000,.06],[250000,.065],[500000,.069],[Infinity,.0699]],mfj:[[20000,.03],[100000,.05],[200000,.055],[400000,.06],[500000,.065],[1000000,.069],[Infinity,.0699]]}},
  DE:{brackets:{single:[[2000,0],[5000,.022],[10000,.039],[20000,.048],[25000,.052],[60000,.0555],[Infinity,.066]]}},
  HI:{brackets:{single:[[2400,.014],[4800,.032],[9600,.055],[14400,.064],[19200,.068],[24000,.072],[36000,.076],[48000,.079],[150000,.0825],[175000,.09],[200000,.10],[Infinity,.11]],mfj:[[4800,.014],[9600,.032],[19200,.055],[28800,.064],[38400,.068],[48000,.072],[72000,.076],[96000,.079],[300000,.0825],[350000,.09],[400000,.10],[Infinity,.11]]}},
  KS:{brackets:{single:[[15000,.031],[30000,.0525],[Infinity,.057]],mfj:[[30000,.031],[60000,.0525],[Infinity,.057]]}},
  LA:{brackets:{single:[[12500,.0185],[50000,.035],[Infinity,.0425]],mfj:[[25000,.0185],[100000,.035],[Infinity,.0425]]}},
  ME:{brackets:{single:[[24500,.058],[58050,.0675],[Infinity,.0715]],mfj:[[49050,.058],[116100,.0675],[Infinity,.0715]]}},
  MD:{brackets:{single:[[1000,.02],[2000,.03],[3000,.04],[100000,.0475],[125000,.05],[150000,.0525],[250000,.055],[Infinity,.0575]],mfj:[[1000,.02],[2000,.03],[3000,.04],[150000,.0475],[175000,.05],[225000,.0525],[300000,.055],[Infinity,.0575]]}},
  MN:{brackets:{single:[[31690,.0535],[104090,.068],[193240,.0785],[Infinity,.0985]],mfj:[[46330,.0535],[184040,.068],[321450,.0785],[Infinity,.0985]]}},
  MO:{brackets:{single:[[1073,.015],[2146,.02],[3219,.025],[4292,.03],[5365,.035],[6438,.04],[Infinity,.047]]}},
  MT:{brackets:{single:[[20500,.047],[Infinity,.059]],mfj:[[41000,.047],[Infinity,.059]]}},
  NE:{brackets:{single:[[3700,.0246],[22170,.0351],[35730,.0501],[Infinity,.0529]],mfj:[[7390,.0246],[44330,.0351],[71470,.0501],[Infinity,.0529]]}},
  NJ:{brackets:{single:[[20000,.014],[35000,.0175],[40000,.035],[75000,.0553],[500000,.0637],[1000000,.0897],[Infinity,.1075]],mfj:[[20000,.014],[50000,.0175],[70000,.035],[80000,.0553],[150000,.0637],[500000,.0897],[Infinity,.1075]]}},
  NM:{brackets:{single:[[5500,.017],[11000,.032],[16000,.047],[210000,.049],[Infinity,.059]],mfj:[[8000,.017],[16000,.032],[24000,.047],[315000,.049],[Infinity,.059]]}},
  NY:{brackets:{single:[[8500,.04],[11700,.045],[13900,.0525],[21400,.0585],[80650,.0625],[215400,.0685],[1077550,.0965],[5000000,.103],[25000000,.109],[Infinity,.109]],mfj:[[17150,.04],[23600,.045],[27900,.0525],[43000,.0585],[161550,.0625],[323200,.0685],[2155350,.0965],[5000000,.103],[25000000,.109],[Infinity,.109]]}},
  ND:{brackets:{single:[[44725,.0195],[225975,.025],[Infinity,.025]],mfj:[[74750,.0195],[275925,.025],[Infinity,.025]]}},
  OH:{brackets:{single:[[26050,0],[100000,.0275],[Infinity,.035]]}},
  OK:{brackets:{single:[[1000,.0025],[2500,.0075],[3750,.0175],[4900,.0275],[7200,.0375],[Infinity,.0475]],mfj:[[2000,.0025],[5000,.0075],[7500,.0175],[9800,.0275],[12200,.0375],[Infinity,.0475]]}},
  OR:{brackets:{single:[[18400,.0475],[46200,.0675],[250000,.0875],[Infinity,.099]],mfj:[[36800,.0475],[92400,.0675],[500000,.0875],[Infinity,.099]]}},
  RI:{brackets:{single:[[73450,.0375],[166950,.0475],[Infinity,.0599]]}},
  SC:{brackets:{single:[[3640,0],[18200,.03],[Infinity,.062]]}},
  VT:{brackets:{single:[[45400,.0335],[110050,.066],[229550,.076],[Infinity,.0875]],mfj:[[75850,.0335],[183400,.066],[236350,.076],[Infinity,.0875]]}},
  VA:{brackets:{single:[[3000,.02],[5000,.03],[17000,.05],[Infinity,.0575]]}},
  WI:{brackets:{single:[[13810,.0354],[27630,.0465],[304170,.0627],[Infinity,.0765]],mfj:[[18420,.0354],[36840,.0465],[405550,.0627],[Infinity,.0765]]}},
  DC:{brackets:{single:[[10000,.04],[40000,.06],[60000,.065],[250000,.085],[500000,.0875],[1000000,.0895],[Infinity,.1075]]}},
};
function calcStateEffRate(annualGross,code,fs){
  if(!annualGross||annualGross<=0||!code)return null;
  const d=STD[code];
  if(d===null||d===undefined)return 0;
  if(d.flat!==undefined)return d.flat;
  if(!d.brackets)return null;
  const tiers=d.brackets[fs]||d.brackets['single'];
  if(!tiers)return null;
  const tax=applyBrackets(annualGross,tiers);
  return Math.round((tax/annualGross)*10000)/100;
}
function stateTag(code,annualGross){
  if(!code)return null;
  const d=STD[code];
  if(d===null||d===undefined)return{label:'no state tax',color:'var(--green)'};
  if(d.flat!==undefined)return{label:'flat rate',color:'var(--text3)'};
  return annualGross>0?{label:'effective rate',color:'var(--blue)'}:{label:'suggested',color:'var(--text3)'};
}
const STATE_LIST=[
  {code:'AL',name:'Alabama'},{code:'AK',name:'Alaska'},{code:'AZ',name:'Arizona'},{code:'AR',name:'Arkansas'},{code:'CA',name:'California'},{code:'CO',name:'Colorado'},{code:'CT',name:'Connecticut'},{code:'DE',name:'Delaware'},{code:'FL',name:'Florida'},{code:'GA',name:'Georgia'},{code:'HI',name:'Hawaii'},{code:'ID',name:'Idaho'},{code:'IL',name:'Illinois'},{code:'IN',name:'Indiana'},{code:'IA',name:'Iowa'},{code:'KS',name:'Kansas'},{code:'KY',name:'Kentucky'},{code:'LA',name:'Louisiana'},{code:'ME',name:'Maine'},{code:'MD',name:'Maryland'},{code:'MA',name:'Massachusetts'},{code:'MI',name:'Michigan'},{code:'MN',name:'Minnesota'},{code:'MS',name:'Mississippi'},{code:'MO',name:'Missouri'},{code:'MT',name:'Montana'},{code:'NE',name:'Nebraska'},{code:'NV',name:'Nevada'},{code:'NH',name:'New Hampshire'},{code:'NJ',name:'New Jersey'},{code:'NM',name:'New Mexico'},{code:'NY',name:'New York'},{code:'NC',name:'North Carolina'},{code:'ND',name:'North Dakota'},{code:'OH',name:'Ohio'},{code:'OK',name:'Oklahoma'},{code:'OR',name:'Oregon'},{code:'PA',name:'Pennsylvania'},{code:'RI',name:'Rhode Island'},{code:'SC',name:'South Carolina'},{code:'SD',name:'South Dakota'},{code:'TN',name:'Tennessee'},{code:'TX',name:'Texas'},{code:'UT',name:'Utah'},{code:'VT',name:'Vermont'},{code:'VA',name:'Virginia'},{code:'WA',name:'Washington'},{code:'WV',name:'West Virginia'},{code:'WI',name:'Wisconsin'},{code:'WY',name:'Wyoming'},{code:'DC',name:'Washington D.C.'},
];

/* ── Utilities ── */
const n=v=>parseFloat(v)||0;
function fmt(v){const abs=Math.abs(v).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');return(v<0?'−$':'$')+abs;}
const mkF=(locked=false,val='')=>({value:val,locked});

/* ── localStorage ── */
const SAVE_KEY='pcalc-v2';
const SAVED=(()=>{try{const r=localStorage.getItem(SAVE_KEY);return r?JSON.parse(r):{}}catch(e){return {};}})();
function persist(s){try{localStorage.setItem(SAVE_KEY,JSON.stringify(s));}catch(e){}}

/* ── Icons ── */
function LockIcon(){return<svg width="13"height="13"viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2.2"strokeLinecap="round"strokeLinejoin="round"><rect x="3"y="11"width="18"height="11"rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;}
function UnlockIcon(){return<svg width="13"height="13"viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2.2"strokeLinecap="round"strokeLinejoin="round"><rect x="3"y="11"width="18"height="11"rx="2"/><path d="M7 11V7a4 4 0 0 1 7.9-1"/></svg>;}
function LockBtn({locked,onToggle}){return<button className={`lock-btn ${locked?'on':'off'}`} onClick={onToggle} title={locked?'Unlock':'Lock'}>{locked?<LockIcon/>:<UnlockIcon/>}</button>;}

function EarnRow({label,field,setField,pay,note}){return(
  <div className="row">
    <div style={{minWidth:168,flex:'0 0 168px'}}><span style={{color:'var(--text)',fontSize:13,fontWeight:500}}>{label}</span>{note&&<span style={{fontSize:11,color:'var(--text3)',marginLeft:6}}>{note}</span>}</div>
    <LockBtn locked={field.locked} onToggle={()=>setField(f=>({...f,locked:!f.locked}))}/>
    <input type="number" min="0" step="0.25" value={field.value} readOnly={field.locked} placeholder="0" style={{width:80}} onChange={e=>!field.locked&&setField(f=>({...f,value:e.target.value}))}/>
    <span style={{fontSize:12,color:'var(--text3)',minWidth:24,flexShrink:0}}>hrs</span>
    <span className="amount" style={{color:pay>0?'var(--accent)':'var(--text3)'}}>{fmt(pay)}</span>
  </div>
);}

function DeductRow({label,subtitle,field,setField,amount,isPercent,isPreTax}){return(
  <div className="row">
    <div style={{minWidth:168,flex:'0 0 168px'}}><div style={{color:'var(--text)',fontSize:13,fontWeight:500}}>{label}</div>{subtitle&&<div style={{fontSize:10,color:'var(--text3)',marginTop:2,lineHeight:1.4}}>{subtitle}</div>}</div>
    <LockBtn locked={field.locked} onToggle={()=>setField(f=>({...f,locked:!f.locked}))}/>
    <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
      <input type="number" min="0" step="0.01" value={field.value} readOnly={field.locked} placeholder="0" style={{width:isPercent?64:84}} onChange={e=>!field.locked&&setField(f=>({...f,value:e.target.value}))}/>
      {isPercent&&<span style={{fontSize:12,color:'var(--text2)'}}>%</span>}
    </div>
    <span className={`pill pill-static ${isPreTax?'pill-pre':'pill-post'}`}>{isPreTax?'● Pre-Tax':'○ After-Tax'}</span>
    <span className="amount" style={{color:amount>0?'var(--red)':'var(--text3)'}}>{fmt(amount)}</span>
  </div>
);}

function TaxRow({label,amount}){return(
  <div className="row"><div style={{minWidth:168,flex:'0 0 168px',color:'var(--text)',fontSize:13,fontWeight:500}}>{label}</div><span style={{fontSize:11,color:'var(--text3)',fontStyle:'italic',flex:1}}>estimated</span><span className="amount" style={{color:amount>0?'var(--red)':'var(--text3)'}}>{fmt(amount)}</span></div>
);}
function SumLine({label,value,dim}){return(
  <div className="sum-line"><span style={{fontSize:dim?12:13,color:dim?'var(--text3)':'var(--text2)'}}>{label}</span><span style={{fontFamily:'var(--mono)',fontSize:dim?12:13,color:dim?'var(--text3)':value<0?'var(--red)':'var(--text)'}}>{fmt(value)}</span></div>
);}

/* ── Main App ── */
function App(){
  const [fs,setFs]=useState(SAVED.fs||'single');
  const [selectedState,setSelectedState]=useState(SAVED.selectedState||'');
  const [base,setBase]=useState(SAVED.base||mkF());
  const [hrs,setHrs]=useState(SAVED.hrs||mkF());
  const [ot,setOt]=useState(SAVED.ot||mkF());
  const [workedHol,setWorkedHol]=useState(SAVED.workedHol||mkF());
  const [pto,setPto]=useState(SAVED.pto||mkF());
  const [sick,setSick]=useState(SAVED.sick||mkF());
  const [hol,setHol]=useState(SAVED.hol||mkF());
  const [preBens,setPreBens]=useState(SAVED.preBens||mkF());
  const [postBens,setPostBens]=useState(SAVED.postBens||mkF());
  const [espp,setEspp]=useState(SAVED.espp||mkF());
  const [kPre,setKPre]=useState(SAVED.kPre||mkF());
  const [kRoth,setKRoth]=useState(SAVED.kRoth||mkF());
  const [kLoan,setKLoan]=useState(SAVED.kLoan||mkF(true,'148.48'));
  const [statePct,setStatePct]=useState(SAVED.statePct||mkF(false,'9'));
  const [flash,setFlash]=useState(false);
  const flashTimer=useRef(null);

  const annualGross=useMemo(()=>{
    const bp=n(base.value);
    const pg=bp*n(hrs.value)+bp*1.5*n(ot.value)+bp*1.5*n(workedHol.value)+bp*n(pto.value)+bp*n(sick.value)+bp*n(hol.value);
    return pg*26;
  },[base,hrs,ot,workedHol,pto,sick,hol]);

  useEffect(()=>{
    if(!selectedState||statePct.locked||annualGross<=0)return;
    const eff=calcStateEffRate(annualGross,selectedState,fs);
    if(eff!==null)setStatePct(f=>({...f,value:String(eff)}));
  },[annualGross,selectedState,fs,statePct.locked]);

  function handleStateSelect(e){
    const code=e.target.value;setSelectedState(code);
    if(!code)return;
    const eff=annualGross>0?calcStateEffRate(annualGross,code,fs):null;
    if(eff!==null){setStatePct(f=>({...f,value:String(eff)}));return;}
    const FALLBACK={AL:5,AR:4.4,CA:6,CT:5,DE:5.2,HI:7.5,KS:5.2,LA:3,ME:6,MD:4.75,MN:6.8,MO:4.7,MT:5.9,NE:5.2,NJ:5.5,NM:4.9,NY:6,ND:2.5,OH:3.75,OK:4.75,OR:9,RI:4.75,SC:6.2,VT:6.6,VA:5.75,WI:5.3,DC:6};
    const fb=FALLBACK[code];if(fb!==undefined)setStatePct(f=>({...f,value:String(fb)}));
  }

  useEffect(()=>{
    persist({fs,selectedState,base,hrs,ot,workedHol,pto,sick,hol,preBens,postBens,espp,kPre,kRoth,kLoan,statePct});
    setFlash(true);clearTimeout(flashTimer.current);flashTimer.current=setTimeout(()=>setFlash(false),1400);
  },[fs,selectedState,base,hrs,ot,workedHol,pto,sick,hol,preBens,postBens,espp,kPre,kRoth,kLoan,statePct]);

  const c=useMemo(()=>{
    const bp=n(base.value);
    const regPay=bp*n(hrs.value),otPay=bp*1.5*n(ot.value),wHolPay=bp*1.5*n(workedHol.value);
    const ptoPay=bp*n(pto.value),sickPay=bp*n(sick.value),holPay=bp*n(hol.value);
    const gross=regPay+otPay+wHolPay+ptoPay+sickPay+holPay;
    const esppAmt=(regPay+ptoPay+sickPay)*n(espp.value)/100;
    const kPreAmt=gross*n(kPre.value)/100,kRothAmt=gross*n(kRoth.value)/100;
    const preBensAmt=n(preBens.value),postBensAmt=n(postBens.value);
    const totPre=preBensAmt+kPreAmt;
    const fedWages=Math.max(0,gross-totPre);
    const fedTax=calcFed(fedWages,fs);
    const oreTax=fedWages*n(statePct.value)/100;
    const ssTax=gross*0.062,medTax=gross*0.0145;
    const loanAmt=n(kLoan.value);
    const totPost=postBensAmt+esppAmt+kRothAmt+loanAmt;
    const netPay=gross-totPre-fedTax-oreTax-ssTax-medTax-totPost;
    return{regPay,otPay,wHolPay,ptoPay,sickPay,holPay,gross,esppAmt,kPreAmt,kRothAmt,preBensAmt,postBensAmt,totPre,fedWages,fedTax,oreTax,ssTax,medTax,loanAmt,totPost,netPay};
  },[fs,base,hrs,ot,workedHol,pto,sick,hol,preBens,postBens,espp,kPre,kRoth,kLoan,statePct]);

  const tagInfo=stateTag(selectedState,annualGross);
  const stateLabel=selectedState?(STATE_LIST.find(x=>x.code===selectedState)||{}).name||'':null;

  return(
    <>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:16,paddingBottom:12,borderBottom:'1px solid var(--brd)'}}>
        <div>
          <p style={{fontSize:10,fontWeight:600,letterSpacing:'.18em',textTransform:'uppercase',color:'var(--accent)',marginBottom:2}}>Bi-Weekly · Hourly</p>
          <h1 style={{fontSize:20,fontWeight:700,color:'var(--text)',letterSpacing:'-.01em'}}>Paycheck Calculator</h1>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
          <span className={`saved-badge ${flash?'show':''}`}>✓ Saved</span>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:12,color:'var(--text2)'}}>Filing Status</span>
            <select value={fs} onChange={e=>setFs(e.target.value)}>
              <option value="single">Single</option><option value="mfj">Married Filing Jointly</option>
              <option value="mfs">Married Filing Separately</option><option value="hoh">Head of Household</option>
            </select>
          </div>
        </div>
      </div>

      <div className="card"><div className="sec-head">Base Pay</div>
        <div className="row">
          <div style={{minWidth:168,flex:'0 0 168px',color:'var(--text)',fontSize:13,fontWeight:500}}>Hourly Rate</div>
          <LockBtn locked={base.locked} onToggle={()=>setBase(f=>({...f,locked:!f.locked}))}/>
          <div style={{display:'flex',alignItems:'center',gap:4}}>
            <span style={{fontSize:13,color:'var(--text2)'}}>$</span>
            <input type="number" min="0" step="0.01" value={base.value} readOnly={base.locked} placeholder="0.00" style={{width:96}} onChange={e=>!base.locked&&setBase(f=>({...f,value:e.target.value}))}/>
            <span style={{fontSize:12,color:'var(--text3)'}}>/hr</span>
          </div>
        </div>
      </div>

      <div className="card"><div className="sec-head">Earnings</div>
        <EarnRow label="Regular Hours"        field={hrs}       setField={setHrs}       pay={c.regPay}/>
        <EarnRow label="Overtime Hours"       field={ot}        setField={setOt}        pay={c.otPay}        note="×1.5"/>
        <EarnRow label="Worked Holiday Hours" field={workedHol} setField={setWorkedHol} pay={c.wHolPay}      note="×1.5"/>
        <EarnRow label="PTO Hours"            field={pto}       setField={setPto}       pay={c.ptoPay}/>
        <EarnRow label="Sick Hours"           field={sick}      setField={setSick}      pay={c.sickPay}/>
        <EarnRow label="Holiday Hours"        field={hol}       setField={setHol}       pay={c.holPay}/>
        <div className="gross-row">
          <span style={{fontSize:11,fontWeight:600,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--text2)'}}>Gross Pay</span>
          <span style={{fontFamily:'var(--mono)',fontSize:17,fontWeight:700,color:c.gross>0?'var(--accent)':'var(--text3)'}}>{fmt(c.gross)}</span>
        </div>
      </div>

      <div className="card"><div className="sec-head">Deductions</div>
        <div className="col-heads">
          <span style={{minWidth:168,flex:'0 0 168px'}}/><span style={{minWidth:32}}/>
          <span className="col-head" style={{minWidth:92}}>Amount</span>
          <span className="col-head" style={{minWidth:88}}>Tax Status</span>
          <span className="col-head" style={{marginLeft:'auto'}}>Deducted</span>
        </div>
        <DeductRow label="Pre-Tax Benefits"   subtitle="Medical · Dental · Vision · Flex Health" field={preBens} setField={setPreBens} amount={c.preBensAmt} isPreTax={true}/>
        <DeductRow label="After-Tax Benefits" subtitle="Life · AD&D · Critical · Accidental · Hospital · Legal" field={postBens} setField={setPostBens} amount={c.postBensAmt} isPreTax={false}/>
        <div className="divider"/>
        <DeductRow label="401k Pre-Tax %" field={kPre}  setField={setKPre}  amount={c.kPreAmt}  isPercent={true} isPreTax={true}/>
        <DeductRow label="401k Roth %"    field={kRoth} setField={setKRoth} amount={c.kRothAmt} isPercent={true} isPreTax={false}/>
        <DeductRow label="ESPP Purchase"  subtitle="% of reg + PTO + sick pay · after-tax" field={espp} setField={setEspp} amount={c.esppAmt} isPercent={true} isPreTax={false}/>
      </div>

      <div className="card"><div className="sec-head">Taxes — Estimated</div>
        <TaxRow label="Federal Income Tax"     amount={c.fedTax}/>
        <TaxRow label="Social Security (6.2%)" amount={c.ssTax}/>
        <TaxRow label="Medicare (1.45%)"       amount={c.medTax}/>
        <div className="row">
          <span style={{fontSize:13,fontWeight:500,color:'var(--text)',flexShrink:0,marginRight:4}}>State Tax</span>
          <select value={selectedState} onChange={handleStateSelect} style={{flex:1,minWidth:110,maxWidth:210,fontSize:12}}>
            <option value="">— select state —</option>
            {STATE_LIST.map(s=><option key={s.code} value={s.code}>{s.name}</option>)}
          </select>
          <LockBtn locked={statePct.locked} onToggle={()=>setStatePct(f=>({...f,locked:!f.locked}))}/>
          <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
            <input type="number" min="0" step="0.01" value={statePct.value} readOnly={statePct.locked} placeholder="0" style={{width:58}} onChange={e=>!statePct.locked&&setStatePct(f=>({...f,value:e.target.value}))}/>
            <span style={{fontSize:12,color:'var(--text2)'}}>%</span>
          </div>
          {tagInfo&&<span style={{fontSize:10,color:tagInfo.color,fontStyle:'italic',flexShrink:0,minWidth:76}}>{tagInfo.label}</span>}
          <span className="amount" style={{color:c.oreTax>0?'var(--red)':'var(--text3)'}}>{fmt(c.oreTax)}</span>
        </div>
      </div>

      <div className="card"><div className="sec-head">Static After-Tax Deductions</div>
        <div className="row">
          <div style={{minWidth:168,flex:'0 0 168px',color:'var(--text)',fontSize:13,fontWeight:500}}>401k Loan(s)</div>
          <LockBtn locked={kLoan.locked} onToggle={()=>setKLoan(f=>({...f,locked:!f.locked}))}/>
          <div style={{display:'flex',alignItems:'center',gap:4}}>
            <span style={{fontSize:13,color:'var(--text2)'}}>$</span>
            <input type="number" min="0" step="0.01" value={kLoan.value} readOnly={kLoan.locked} placeholder="0.00" style={{width:84}} onChange={e=>!kLoan.locked&&setKLoan(f=>({...f,value:e.target.value}))}/>
          </div>
          <span style={{fontSize:11,color:'var(--text3)',fontStyle:'italic',flex:1}}>fixed · after-tax</span>
          <span className="amount" style={{color:c.loanAmt>0?'var(--red)':'var(--text3)'}}>{fmt(c.loanAmt)}</span>
        </div>
      </div>

      <div className="card" style={{border:'1px solid var(--brd-em)'}}>
        <div className="sec-head">Summary</div>
        <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:7}}>
          <SumLine label="Gross Pay"                       value={c.gross}/>
          <SumLine label="Pre-Tax Deductions"              value={-c.totPre}/>
          <SumLine label="→ Federal Taxable Wages"         value={c.fedWages} dim/>
          <SumLine label="Federal Income Tax"              value={-c.fedTax}/>
          <SumLine label="Social Security (6.2%)"          value={-c.ssTax}/>
          <SumLine label="Medicare (1.45%)"                value={-c.medTax}/>
          <SumLine label={`State Tax${stateLabel?' ('+stateLabel+')':''}`} value={-c.oreTax}/>
          <SumLine label="After-Tax Deductions"            value={-c.totPost}/>
          <div style={{borderTop:'1px solid var(--brd-em)',marginTop:4,paddingTop:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--accent)'}}>Estimated Net Pay</span>
            <span style={{fontFamily:'var(--mono)',fontSize:24,fontWeight:700,color:'var(--accent)'}}>{fmt(c.netPay)}</span>
          </div>
        </div>
      </div>
      <p style={{fontSize:11,color:'var(--text3)',textAlign:'center',marginTop:10,lineHeight:1.8}}>
        Federal: 2025 IRS Pub. 15-T · State brackets: 2024/2025 effective rate (tax ÷ gross) · Bi-weekly · Estimates only
      </p>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
