<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salary Paycheck Calculator</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg:      #0d1117;
      --card:    #161b22;
      --card-dk: #0f172a;
      --brd:     rgba(255,255,255,0.08);
      --brd-em:  rgba(255,255,255,0.15);
      --text:    #e6edf3;
      --text2:   #8b949e;
      --text3:   #484f58;
      --accent:  #d97706;
      --acc-bg:  rgba(217,119,6,0.12);
      --acc-brd: rgba(217,119,6,0.45);
      --green:   #3fb950;
      --grn-bg:  rgba(63,185,80,0.12);
      --grn-brd: rgba(63,185,80,0.40);
      --red:     #f85149;
      --mono:    'Cascadia Code','JetBrains Mono','Fira Code','Courier New',monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    #root { max-width: 720px; margin: 0 auto; padding: 24px 16px 52px; }

    input[type="number"] {
      background: #010409;
      border: 1px solid var(--brd);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 4px 8px;
      text-align: right;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      -moz-appearance: textfield;
    }
    input[type="number"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--acc-bg); }
    input[type="number"][readonly] { opacity: 0.45; cursor: not-allowed; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input[type="text"] {
      background: #010409;
      border: 1px solid var(--brd);
      border-radius: 4px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 4px 8px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--acc-bg); }
    input[type="text"][readonly] { opacity: 0.45; cursor: not-allowed; }

    select {
      background: #1c2128;
      border: 1px solid var(--brd-em);
      border-radius: 4px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 5px 8px;
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: var(--accent); }

    button { font-family: inherit; cursor: pointer; outline: none; }

    .card { background: var(--card); border: 1px solid var(--brd); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
    .sec-head { background: var(--card-dk); border-bottom: 1px solid var(--brd); color: var(--text2); font-size: 10px; font-weight: 600; letter-spacing: .15em; padding: 5px 16px; text-transform: uppercase; }
    .row { display: flex; align-items: center; gap: 8px; padding: 7px 16px; border-bottom: 1px solid var(--brd); min-height: 44px; }
    .row:last-child { border-bottom: none; }
    .amount { font-family: var(--mono); font-size: 13px; font-weight: 600; margin-left: auto; min-width: 96px; text-align: right; }
    .lock-btn { display: flex; align-items: center; justify-content: center; padding: 4px 7px; border-radius: 4px; flex-shrink: 0; transition: all .15s; line-height: 1; }
    .lock-btn.on  { background: var(--acc-bg);  border: 1px solid var(--acc-brd); color: var(--accent); }
    .lock-btn.off { background: transparent;     border: 1px solid var(--brd);     color: var(--text3);  }
    .lock-btn:hover { opacity: 0.75; }
    .pill { border-radius: 99px; font-size: 10px; font-weight: 600; letter-spacing: .06em; padding: 3px 10px; text-transform: uppercase; white-space: nowrap; min-width: 84px; text-align: center; flex-shrink: 0; border: 1px solid; opacity: 0.65; cursor: default; }
    .pill-toggle { cursor: pointer; opacity: 1; transition: all .15s; }
    .pill-pre  { background: var(--grn-bg); border-color: var(--grn-brd); color: var(--green); }
    .pill-post { background: rgba(255,255,255,0.04); border-color: var(--brd-em); color: var(--text2); }
    .col-heads { display: flex; align-items: center; gap: 8px; padding: 3px 16px; min-height: 28px; background: var(--card-dk); border-bottom: 1px solid var(--brd); }
    .col-head { font-size: 10px; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; }
    .sum-line { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; }
    .saved-badge { font-size: 11px; color: var(--green); opacity: 0; transition: opacity .3s; pointer-events: none; }
    .saved-badge.show { opacity: 1; }
    .divider { border-top: 1px solid var(--brd-em); margin: 0 16px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

/* ══════════════════════════════════════════
   TAX MATH  (2025 Federal)
══════════════════════════════════════════ */

function applyBrackets(income, tiers) {
  let tax = 0, prev = 0;
  for (const [cap, rate] of tiers) {
    if (income <= prev) break;
    tax += (Math.min(income, cap) - prev) * rate;
    prev = cap;
    if (!isFinite(cap)) break;
  }
  return tax;
}

const FED = {
  single: { std: 15000, t: [[11925,.10],[48475,.12],[103350,.22],[197300,.24],[250525,.32],[626350,.35],[Infinity,.37]] },
  mfj:   { std: 30000, t: [[23850,.10],[96950,.12],[206700,.22],[394600,.24],[501050,.32],[751600,.35],[Infinity,.37]] },
  mfs:   { std: 15000, t: [[11925,.10],[48475,.12],[103350,.22],[197300,.24],[250525,.32],[626350,.35],[Infinity,.37]] },
  hoh:   { std: 22500, t: [[17000,.10],[64850,.12],[103350,.22],[197300,.24],[250500,.32],[626350,.35],[Infinity,.37]] },
};

function calcFed(bw, fs) {
  const cfg = FED[fs];
  return applyBrackets(Math.max(0, bw * 26 - cfg.std), cfg.t) / 26;
}

/* ══════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════ */

const n = v => parseFloat(v) || 0;

function fmt(v) {
  const abs = Math.abs(v).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return (v < 0 ? '−$' : '$') + abs;
}

const mkF  = (locked = false, val = '') => ({ value: val, locked });
const mkSD = (locked = false, val = '', desc = '', preTax = false) => ({ value: val, locked, description: desc, preTax });

/* ══════════════════════════════════════════
   LOCALSTORAGE
══════════════════════════════════════════ */

const SAVE_KEY = 'pcalc-salary-v1';

const SAVED = (() => {
  try { const r = localStorage.getItem(SAVE_KEY); return r ? JSON.parse(r) : {}; }
  catch(e) { return {}; }
})();

function persist(s) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(s)); } catch(e) {}
}

/* ══════════════════════════════════════════
   ICONS
══════════════════════════════════════════ */

function LockIcon() {
  return (
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  );
}
function UnlockIcon() {
  return (
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a4 4 0 0 1 7.9-1"/>
    </svg>
  );
}

/* ══════════════════════════════════════════
   COMPONENTS
══════════════════════════════════════════ */

function LockBtn({ locked, onToggle }) {
  return (
    <button className={`lock-btn ${locked ? 'on' : 'off'}`} onClick={onToggle}
      title={locked ? 'Unlock field' : 'Lock field'}>
      {locked ? <LockIcon /> : <UnlockIcon />}
    </button>
  );
}

/* Deduction row — dollar or percent, static tax pill */
function DeductRow({ label, subtitle, field, setField, amount, isPercent, isPreTax }) {
  return (
    <div className="row">
      <div style={{ minWidth: 168, flex: '0 0 168px' }}>
        <div style={{ color: 'var(--text)', fontSize: 13, fontWeight: 500 }}>{label}</div>
        {subtitle && <div style={{ fontSize: 10, color: 'var(--text3)', marginTop: 2, lineHeight: 1.4 }}>{subtitle}</div>}
      </div>
      <LockBtn locked={field.locked} onToggle={() => setField(f => ({ ...f, locked: !f.locked }))} />
      <div style={{ display: 'flex', alignItems: 'center', gap: 4, flexShrink: 0 }}>
        <input type="number" min="0" step="0.01"
          value={field.value} readOnly={field.locked} placeholder="0"
          style={{ width: isPercent ? 64 : 84 }}
          onChange={e => !field.locked && setField(f => ({ ...f, value: e.target.value }))}
        />
        {isPercent && <span style={{ fontSize: 12, color: 'var(--text2)' }}>%</span>}
      </div>
      <span className={`pill ${isPreTax ? 'pill-pre' : 'pill-post'}`}>
        {isPreTax ? '● Pre-Tax' : '○ After-Tax'}
      </span>
      <span className="amount" style={{ color: amount > 0 ? 'var(--red)' : 'var(--text3)' }}>{fmt(amount)}</span>
    </div>
  );
}

/* Calculated tax row — no input */
function TaxRow({ label, amount }) {
  return (
    <div className="row">
      <div style={{ minWidth: 168, flex: '0 0 168px', color: 'var(--text)', fontSize: 13, fontWeight: 500 }}>{label}</div>
      <span style={{ fontSize: 11, color: 'var(--text3)', fontStyle: 'italic', flex: 1 }}>estimated</span>
      <span className="amount" style={{ color: amount > 0 ? 'var(--red)' : 'var(--text3)' }}>{fmt(amount)}</span>
    </div>
  );
}

/* Summary line */
function SumLine({ label, value, dim }) {
  return (
    <div className="sum-line">
      <span style={{ fontSize: dim ? 12 : 13, color: dim ? 'var(--text3)' : 'var(--text2)' }}>{label}</span>
      <span style={{ fontFamily: 'var(--mono)', fontSize: dim ? 12 : 13, color: dim ? 'var(--text3)' : value < 0 ? 'var(--red)' : 'var(--text)' }}>{fmt(value)}</span>
    </div>
  );
}

/* ══════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════ */

function App() {
  const [fs, setFs] = useState(SAVED.fs || 'single');

  /* Annual salary */
  const [salary, setSalary] = useState(SAVED.salary || mkF());

  /* Benefit deductions */
  const [preBens,      setPreBens]      = useState(SAVED.preBens      || mkF());
  const [postBens,     setPostBens]     = useState(SAVED.postBens     || mkF());
  const [postRetire,   setPostRetire]   = useState(SAVED.postRetire   || mkF());

  /* 401k */
  const [kPre,  setKPre]  = useState(SAVED.kPre  || mkF());
  const [kRoth, setKRoth] = useState(SAVED.kRoth || mkF());

  /* State tax */
  const [statePct, setStatePct] = useState(SAVED.statePct || mkF(false, '9'));

  /* Static deduction — description + amount + pre/after-tax toggle */
  const [staticD, setStaticD] = useState(SAVED.staticD || mkSD(false, '', '', false));

  const [flash, setFlash] = useState(false);
  const flashTimer = useRef(null);

  useEffect(() => {
    persist({ fs, salary, preBens, postBens, postRetire, kPre, kRoth, statePct, staticD });
    setFlash(true);
    clearTimeout(flashTimer.current);
    flashTimer.current = setTimeout(() => setFlash(false), 1400);
  }, [fs, salary, preBens, postBens, postRetire, kPre, kRoth, statePct, staticD]);

  /* Calculations */
  const c = useMemo(() => {
    const grossPay = n(salary.value) / 26;

    const kPreAmt    = grossPay * n(kPre.value)  / 100;
    const kRothAmt   = grossPay * n(kRoth.value) / 100;
    const staticAmt  = n(staticD.value);

    const preBensAmt    = n(preBens.value);
    const postBensAmt   = n(postBens.value);
    const postRetireAmt = n(postRetire.value);

    const totPre   = preBensAmt + kPreAmt + (staticD.preTax ? staticAmt : 0);
    const fedWages = Math.max(0, grossPay - totPre);
    const fedTax   = calcFed(fedWages, fs);
    const oreTax   = fedWages * n(statePct.value) / 100;
    const ssTax    = grossPay * 0.062;
    const medTax   = grossPay * 0.0145;

    const totPost  = postBensAmt + postRetireAmt + kRothAmt + (!staticD.preTax ? staticAmt : 0);
    const netPay   = grossPay - totPre - fedTax - oreTax - ssTax - medTax - totPost;

    return { grossPay, kPreAmt, kRothAmt, staticAmt, preBensAmt, postBensAmt, postRetireAmt, totPre, fedWages, fedTax, oreTax, ssTax, medTax, totPost, netPay };
  }, [salary, preBens, postBens, postRetire, kPre, kRoth, statePct, staticD, fs]);

  return (
    <>
      {/* HEADER */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:16, paddingBottom:12, borderBottom:'1px solid var(--brd)' }}>
        <div>
          <p style={{ fontSize:10, fontWeight:600, letterSpacing:'.18em', textTransform:'uppercase', color:'var(--accent)', marginBottom:2 }}>Bi-Weekly · Salaried</p>
          <h1 style={{ fontSize:20, fontWeight:700, color:'var(--text)', letterSpacing:'-.01em' }}>Paycheck Calculator</h1>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <span className={`saved-badge ${flash ? 'show' : ''}`}>✓ Saved</span>
          <span style={{ fontSize:12, color:'var(--text2)' }}>Filing Status</span>
          <select value={fs} onChange={e => setFs(e.target.value)}>
            <option value="single">Single</option>
            <option value="mfj">Married Filing Jointly</option>
            <option value="mfs">Married Filing Separately</option>
            <option value="hoh">Head of Household</option>
          </select>
        </div>
      </div>

      {/* SALARY */}
      <div className="card">
        <div className="sec-head">Base Pay</div>
        <div className="row">
          <div style={{ minWidth:168, flex:'0 0 168px', color:'var(--text)', fontSize:13, fontWeight:500 }}>Annual Salary</div>
          <LockBtn locked={salary.locked} onToggle={() => setSalary(f => ({ ...f, locked: !f.locked }))} />
          <div style={{ display:'flex', alignItems:'center', gap:4 }}>
            <span style={{ fontSize:13, color:'var(--text2)' }}>$</span>
            <input type="number" min="0" step="1" value={salary.value} readOnly={salary.locked} placeholder="0"
              style={{ width:112 }}
              onChange={e => !salary.locked && setSalary(f => ({ ...f, value: e.target.value }))} />
            <span style={{ fontSize:12, color:'var(--text3)' }}>/yr</span>
          </div>
          <span style={{ fontSize:11, color:'var(--text2)', marginLeft:'auto' }}>
            Bi-weekly gross:&nbsp;
            <span style={{ fontFamily:'var(--mono)', color: c.grossPay > 0 ? 'var(--accent)' : 'var(--text3)', fontWeight:600 }}>{fmt(c.grossPay)}</span>
          </span>
        </div>
      </div>

      {/* DEDUCTIONS */}
      <div className="card">
        <div className="sec-head">Deductions</div>
        <div className="col-heads">
          <span style={{ minWidth:168, flex:'0 0 168px' }} />
          <span style={{ minWidth:32 }} />
          <span className="col-head" style={{ minWidth:92 }}>Amount</span>
          <span className="col-head" style={{ minWidth:88 }}>Tax Status</span>
          <span className="col-head" style={{ marginLeft:'auto' }}>Deducted</span>
        </div>

        <DeductRow
          label="Pre-Tax Benefits"
          subtitle="Medical · Dental · Vision · Flex Health"
          field={preBens} setField={setPreBens}
          amount={c.preBensAmt} isPreTax={true}
        />
        <DeductRow
          label="After-Tax Benefits"
          subtitle="Life · AD&D · Critical · Accidental · Hospital · Legal"
          field={postBens} setField={setPostBens}
          amount={c.postBensAmt} isPreTax={false}
        />
        <DeductRow
          label="After-Tax Non-Roth"
          field={postRetire} setField={setPostRetire}
          amount={c.postRetireAmt} isPreTax={false}
        />

        <div className="divider" />

        <DeductRow
          label="401k Pre-Tax %"
          field={kPre} setField={setKPre}
          amount={c.kPreAmt} isPercent={true} isPreTax={true}
        />
        <DeductRow
          label="401k Roth %"
          field={kRoth} setField={setKRoth}
          amount={c.kRothAmt} isPercent={true} isPreTax={false}
        />
      </div>

      {/* TAXES */}
      <div className="card">
        <div className="sec-head">Taxes — Estimated</div>
        <TaxRow label="Federal Income Tax"     amount={c.fedTax} />
        <TaxRow label="Social Security (6.2%)" amount={c.ssTax}  />
        <TaxRow label="Medicare (1.45%)"       amount={c.medTax} />
        {/* State tax — editable % */}
        <div className="row">
          <div style={{ minWidth:168, flex:'0 0 168px', color:'var(--text)', fontSize:13, fontWeight:500 }}>State Tax</div>
          <LockBtn locked={statePct.locked} onToggle={() => setStatePct(f => ({ ...f, locked: !f.locked }))} />
          <div style={{ display:'flex', alignItems:'center', gap:4, flexShrink:0 }}>
            <input type="number" min="0" step="0.1"
              value={statePct.value} readOnly={statePct.locked} placeholder="0"
              style={{ width:64 }}
              onChange={e => !statePct.locked && setStatePct(f => ({ ...f, value: e.target.value }))}
            />
            <span style={{ fontSize:12, color:'var(--text2)' }}>%</span>
          </div>
          <span style={{ fontSize:11, color:'var(--text3)', fontStyle:'italic', flex:1 }}>of taxable wages</span>
          <span className="amount" style={{ color: c.oreTax > 0 ? 'var(--red)' : 'var(--text3)' }}>{fmt(c.oreTax)}</span>
        </div>
      </div>

      {/* STATIC DEDUCTIONS */}
      <div className="card">
        <div className="sec-head">Static Deductions</div>
        <div className="row">
          <input
            type="text"
            maxLength={48}
            value={staticD.description}
            readOnly={staticD.locked}
            placeholder="Description"
            style={{ minWidth:0, flex:'1 1 160px', maxWidth:200 }}
            onChange={e => !staticD.locked && setStaticD(f => ({ ...f, description: e.target.value }))}
          />
          <LockBtn locked={staticD.locked} onToggle={() => setStaticD(f => ({ ...f, locked: !f.locked }))} />
          <div style={{ display:'flex', alignItems:'center', gap:4, flexShrink:0 }}>
            <span style={{ fontSize:13, color:'var(--text2)' }}>$</span>
            <input type="number" min="0" step="0.01"
              value={staticD.value} readOnly={staticD.locked} placeholder="0.00"
              style={{ width:84 }}
              onChange={e => !staticD.locked && setStaticD(f => ({ ...f, value: e.target.value }))}
            />
          </div>
          <button
            className={`pill pill-toggle ${staticD.preTax ? 'pill-pre' : 'pill-post'}`}
            onClick={() => !staticD.locked && setStaticD(f => ({ ...f, preTax: !f.preTax }))}
            title="Toggle pre-tax / after-tax"
          >
            {staticD.preTax ? '● Pre-Tax' : '○ After-Tax'}
          </button>
          <span className="amount" style={{ color: c.staticAmt > 0 ? 'var(--red)' : 'var(--text3)' }}>{fmt(c.staticAmt)}</span>
        </div>
      </div>

      {/* SUMMARY */}
      <div className="card" style={{ border:'1px solid var(--brd-em)' }}>
        <div className="sec-head">Summary</div>
        <div style={{ padding:'12px 16px', display:'flex', flexDirection:'column', gap:7 }}>
          <SumLine label="Gross Pay (Bi-Weekly)"     value={c.grossPay} />
          <SumLine label="Pre-Tax Deductions"        value={-c.totPre} />
          <SumLine label="→ Federal Taxable Wages"   value={c.fedWages} dim />
          <SumLine label="Federal Income Tax"        value={-c.fedTax} />
          <SumLine label="Social Security (6.2%)"    value={-c.ssTax} />
          <SumLine label="Medicare (1.45%)"          value={-c.medTax} />
          <SumLine label="State Tax"                 value={-c.oreTax} />
          <SumLine label="After-Tax Deductions"      value={-c.totPost} />
          <div style={{ borderTop:'1px solid var(--brd-em)', marginTop:4, paddingTop:12, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <span style={{ fontSize:12, fontWeight:600, letterSpacing:'.08em', textTransform:'uppercase', color:'var(--accent)' }}>Estimated Net Pay</span>
            <span style={{ fontFamily:'var(--mono)', fontSize:24, fontWeight:700, color:'var(--accent)' }}>{fmt(c.netPay)}</span>
          </div>
        </div>
      </div>

      {/* DISCLAIMER */}
      <p style={{ fontSize:11, color:'var(--text3)', textAlign:'center', marginTop:10, lineHeight:1.8 }}>
        Federal income tax: 2025 IRS Pub. 15-T withholding tables · State tax: manual % of federal taxable wages<br />
        SS wage base $176,100 · Medicare additional 0.9% not calculated above $200k · Estimates only
      </p>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
